<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Weeks Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Life Weeks Tracker</h1>
        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Total Weeks</div>
            <div class="stat-value" id="totalWeeks">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Weeks Passed</div>
            <div class="stat-value" id="weeksPassed">0</div>
          </div>
          <div class="stat-card highlight">
            <div class="stat-label">Weeks Remaining</div>
            <div class="stat-value" id="weeksRemaining">0</div>
          </div>
        </div>
        <div class="age-info" id="ageInfo"></div>
      </header>

      <div class="controls">
        <button id="toggleBtn" class="toggle-btn">Show All Weeks</button>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search week..."
        />
        <div class="data-controls">
          <button id="exportBtn" class="data-btn" title="Export your data as JSON">
            ↓ Export
          </button>
          <button id="importBtn" class="data-btn" title="Import data from JSON file">
            ↑ Import
          </button>
        </div>
      </div>

      <div class="weeks-grid" id="weeksGrid"></div>
    </div>

    <div id="birthDateModal" class="modal">
      <div class="modal-content birth-date-modal">
        <h2>Welcome to Life Weeks Tracker</h2>
        <p>Let's start by setting your date of birth</p>
        <div class="birth-date-input-group">
          <label for="birthDateInput">Enter your date of birth:</label>
          <input
            type="date"
            id="birthDateInput"
            class="birth-date-input"
          />
        </div>
        <button id="birthDateSubmitBtn" class="save-btn">Continue</button>
      </div>
    </div>

    <div id="modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Week <span id="weekNumber"></span></h2>
        <div class="week-date-info" id="weekDateInfo"></div>
        <label for="highlightsText">Highlights for this week:</label>
        <textarea
          id="highlightsText"
          placeholder="Enter your highlights, achievements, or notes for this week..."
        ></textarea>
        <button id="saveBtn" class="save-btn">Save Highlights</button>
      </div>
    </div>

    <input type="file" id="importFile" style="display: none" accept=".json" />

    <script src="script.js"></script>
  </body>
</html>
